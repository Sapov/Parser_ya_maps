services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    restart: always
    build: .
    volumes:
      - .:/app
    depends_on:
      - redis
    command: 'celery -A celery_app worker --loglevel=info --concurrency=1'

    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

    deploy:
      resources:
        limits:
          memory: 4G  # Увеличить лимит памяти
#          cpus: '2'
        reservations:
          memory: 2G
    shm_size: 2gb  # Важно! Увеличить разделяемую память

  postgres:
    image: postgres:15
    restart: always
    container_name: postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/pg




volumes:
  redis_data:
  postgres_data:
    name: postgres_data